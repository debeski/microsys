{% load crispy_forms_tags %}

<form method="post" action="{{ request.path }}{% if request.GET.model %}?model={{ request.GET.model }}{% endif %}{% if request.GET.id %}&id={{ request.GET.id }}{% endif %}">
    {% csrf_token %}
    {% crispy form %}
    {% if not form_has_submit %}
        <div class="mt-3 text-end pt-3 border-top">
            {% if instance %}
                <div class="d-inline-flex align-items-center">
                    <button type="submit" class="btn btn-primary px-4 rounded-start-pill rounded-end-0"><i class="bi bi-check2-circle me-1"></i> {{ MS_TRANS.btn_update|default:"تحديث" }}</button>
                    <button type="button" class="btn btn-outline-warning px-4 rounded-end-pill rounded-start-0 dynamic-back-btn"><i class="bi bi-x-circle me-1"></i> {{ MS_TRANS.btn_cancel|default:"إلغاء" }}</button>
                </div>
            {% else %}
                <button type="submit" class="btn btn-primary px-4 rounded-pill"><i class="bi bi-plus-circle me-1"></i> {{ MS_TRANS.btn_add_new|default:"إضافة" }}</button>
            {% endif %}
        </div>
    {% endif %}
</form>
