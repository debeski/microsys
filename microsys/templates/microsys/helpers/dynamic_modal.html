
{% load static %}

<div class="modal fade" id="universalDynamicModal" tabindex="-1" aria-labelledby="dynamicModalTitle" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content glass-card">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title" id="dynamicModalTitle">
                    <i class="bi bi-gear-fill me-2 text-primary"></i>
                    <span id="dynamicModalTitleText" class="fw-bold">Manage Records</span>
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="universalDynamicModalBody">
                <!-- Content loaded via AJAX -->
            </div>
            <div class="modal-footer border-0 pt-0" id="universalDynamicModalFooter">
                <button type="button" class="btn btn-secondary rounded-pill" data-bs-dismiss="modal">
                    {{ MS_TRANS.close_label|default:"إغلاق" }}
                </button>
            </div>
        </div>
    </div>
</div>

<script src="{% static 'microsys/helpers/dynamic_modal/js/main.js' %}" defer></script>
